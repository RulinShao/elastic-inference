### model
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: drtulu_qwen35
dataset_dir: /path/to/elastic-serving/sft/data
template: qwen3
cutoff_len: 16384
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### Masking is automatic via multi-turn sharegpt format:
###   system, human, observation → masked (not trained on)
###   function_call, gpt        → trained on

### output
output_dir: /path/to/elastic-serving/sft/ckpts/qwen35-9b-dr-sft
logging_steps: 5
save_strategy: steps
save_steps: 200
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: wandb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
weight_decay: 0.01
